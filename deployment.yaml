apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment1
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      imagePullSecrets:
      - name: ecr-key
      containers:
      - name: myapp
        image: 773160770272.dkr.ecr.us-east-1.amazonaws.com/devsecops/udemy-project:8
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
